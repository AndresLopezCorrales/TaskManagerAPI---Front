<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link href="output.css" rel="stylesheet" />
</head>

<body class="bg-slate-50 text-neutral-100 min-h-screen flex flex-col items-center px-4 pt-14 pb-28">

    <!-- Header -->
    <header class="w-full max-w-xl mb-12">
        <h1 class="text-5xl md:text-6xl font-extralight text-violet-900 leading-none tracking-tight">
            YET ANOTHER <br> TODO LIST APP
        </h1>
        <div class="w-10 h-0.5 bg-violet-800 mt-5"></div>
    </header>

    <!-- Main -->
    <main class="w-full max-w-xl">

        <section class="bg-violet-800 border border-violet-950 rounded-xl p-5 mb-6">
            <div class="flex gap-3">
                <input id="task-input" type="text" placeholder="Escribe una nueva tarea..." maxlength="200"
                    autocomplete="off"
                    class="flex-1 bg-violet-500 border border-violet-600 rounded-lg px-4 py-3 text-sm text-neutral-100 placeholder-violet-200 outline-none transition duration-200 focus:border-violet-300 focus:ring-2 focus:ring-violet-400/10" />
                <button id="btn-add"
                    class="tracking-wide rounded-lg whitespace-nowrap transition duration-150 hover:animate-pulse active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <!-- Plus icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24">
                        <g fill="none">
                            <circle cx="12" cy="12" r="9" fill="currentColor" fill-opacity="0.25" />
                            <path stroke="currentColor" stroke-linecap="square" stroke-linejoin="round"
                                stroke-width="1.2" d="M12 8v8m4-4H8" />
                        </g>
                    </svg>
                </button>
            </div>
        </section>

        <!-- Stats -->
        <section id="stats" class="hidden tracking-widest uppercase text-neutral-600 pb-6">

            <div class="flex justify-between items-start">

                <div class="flex gap-12">

                    <div class="flex flex-col items-center">
                        <b id="count-total"
                            class="text-blue-500 font-medium text-2xl w-14 h-14 flex items-center justify-center rounded-full border-2 border-blue-500">
                            0
                        </b>
                        <span class="mt-2 text-sm">Total</span>
                    </div>

                    <div class="flex flex-col items-center">
                        <b id="count-pending"
                            class="text-blue-500 font-medium text-2xl w-14 h-14 flex items-center justify-center rounded-full border-2 border-blue-500">
                            0
                        </b>
                        <span class="mt-2 text-sm">Pendientes</span>
                    </div>

                </div>

                <div class="flex flex-col items-center">
                    <b id="count-done"
                        class="text-blue-500 font-medium text-2xl w-14 h-14 flex items-center justify-center rounded-full border-2 border-blue-500">
                        0
                    </b>
                    <span class="mt-2 text-sm">Completadas</span>
                </div>

            </div>

        </section>

        <!-- Lista de tareas -->
        <section id="task-list" class="flex flex-col gap-2">
            <div class="flex justify-center py-12">
                <div class="w-5 h-5 rounded-full border-2 border-violet-500 border-t-violet-400 animate-spin"></div>
            </div>
        </section>

        <!-- Toast -->
        <div id="toast"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 hidden bg-blue-700 border border-blue-950 rounded-lg px-5 py-3 text-sm z-50 whitespace-nowrap shadow-xl">
        </div>

    </main>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
