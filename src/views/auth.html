<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yet Another Todo List App</title>

    <link href="../output.css" rel="stylesheet">

</head>

<body class="min-h-screen flex items-center justify-center bg-[#F0EEF6]">

    <div class="w-full max-w-2xl px-4">

        <!-- Title -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-semibold tracking-[0.2em] text-[#5B21B6] uppercase mb-3"
                style="font-family:Cinzel,serif;">
                Yet Another Todo List App
            </h1>

            <div class="mx-auto w-16 h-[3px] bg-[#7C3AED] rounded-full"></div>
        </header>

        <main>

            <!-- Card -->
            <div class="bg-[#5B21B6] rounded-2xl p-8 shadow-2xl">

                <h2 class="text-white text-2xl font-semibold text-center mb-7">
                    Task Manager
                </h2>

                <!-- Tabs -->
                <div class="flex gap-3 mb-6">

                    <button id="btn-login-tab"
                        class="flex-1 py-3 rounded-xl text-white font-medium bg-[#8B5CF6] transition">
                        Login
                    </button>

                    <button id="btn-register-tab"
                        class="flex-1 py-3 rounded-xl text-white font-medium border border-[#7C3AED]">
                        Register
                    </button>

                </div>

                <!-- Form -->
                <div class="flex flex-col gap-4">

                    <input id="email" type="email" placeholder="Email"
                        class="w-full bg-[#2D2D2D] text-white rounded-xl px-5 py-4 border border-transparent focus:border-purple-400 focus:outline-none">

                    <input id="password" type="password" placeholder="Password"
                        class="w-full bg-[#2D2D2D] text-white rounded-xl px-5 py-4 border border-transparent focus:border-purple-400 focus:outline-none">

                    <button id="submit-btn"
                        class="w-full bg-[#8B5CF6] hover:bg-[#7C3AED] text-white font-semibold rounded-xl py-4 transition active:scale-95">
                        Login
                    </button>

                </div>

            </div>

        </main>

    </div>

    <script type="module" src="../js/auth/authView.js"></script>

</body>

</html>
